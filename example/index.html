<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lightweight-charts-mtf — IDX Stock Multi-Timeframe Demo</title>
  <meta name="description" content="Open-source plugin for TradingView Lightweight Charts. Display higher-timeframe candles alongside your main chart." />
  <script type="importmap">
    {
      "imports": {
        "lightweight-charts": "https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.mjs"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fffcee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
    #chart { position: fixed; top: 0; left: 160px; right: 0; height: 100vh; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #fffcee; color: #4a4a4a; font-size: 16px; font-weight: 500;
      z-index: 100; transition: opacity 0.3s ease;
    }
    #controls {
      position: fixed; top: 12px; left: 172px; z-index: 10;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .control-group {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 8px; padding: 6px 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      display: flex; align-items: center; gap: 8px;
    }
    label {
      color: #6b7280; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    input[type="range"] {
      width: 70px; accent-color: #4caf50; cursor: pointer;
    }
    select {
      font-size: 12px; font-weight: 600; padding: 4px 8px; border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 6px; background: #ffffff; color: #4a4a4a; cursor: pointer;
      outline: none; transition: border-color 0.2s;
    }
    select:hover {
      border-color: #4caf50;
    }
    .value {
      color: #4caf50; font-size: 12px; font-weight: 600; min-width: 18px; text-align: center;
    }
    #live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.25);
      border-radius: 6px;
    }
    .live-text {
      color: #2e7d32;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .pulse-dot {
      width: 6px;
      height: 6px;
      background-color: #2e7d32;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% {
        transform: scale(0.9);
        box-shadow: 0 0 0 0 rgba(8, 153, 129, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 4px rgba(8, 153, 129, 0);
      }
      100% {
        transform: scale(0.9);
        box-shadow: 0 0 0 0 rgba(8, 153, 129, 0);
      }
    }
    #watchlist {
      position: fixed; top: 0; left: 0; width: 160px; height: 100vh;
      background: #ffffff;
      border-right: 1px solid rgba(0, 0, 0, 0.06);
      z-index: 10; display: flex; flex-direction: column;
    }
    #watchlist-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 14px 10px; border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    #watchlist-title {
      color: #4a4a4a; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; margin-left: auto;
    }
    #watchlist-entries {
      flex: 1; overflow-y: auto; padding: 4px 0;
    }
    .watchlist-item {
      display: grid; grid-template-columns: 1fr auto auto; gap: 8px;
      align-items: center; padding: 10px 14px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .watchlist-item:hover {
      background: rgba(0, 0, 0, 0.03);
    }
    .watchlist-item.active {
      border-left-color: #4caf50;
      background: rgba(76, 175, 80, 0.08);
    }
    .wl-symbol {
      color: #4a4a4a; font-size: 13px; font-weight: 600;
    }
    .wl-price {
      color: #4a4a4a; font-size: 13px; font-weight: 500; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .wl-change {
      font-size: 11px; font-weight: 600; text-align: right; min-width: 52px;
      font-variant-numeric: tabular-nums;
    }
    .wl-change.pos { color: #2e7d32; }
    .wl-change.neg { color: #d32f2f; }
    .wl-change.neu { color: #9e9e9e; }
    #context-menu {
      position: fixed; display: none; z-index: 999;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px; padding: 4px; min-width: 160px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }
    #context-menu-refresh {
      padding: 8px 14px; color: #4a4a4a; font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer; transition: background 0.12s;
      display: flex; align-items: center; gap: 8px;
    }
    #context-menu-refresh:hover {
      background: rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <div id="loading">Loading IDX Stock Data...</div>
  
  <div id="controls">
    <div class="control-group">
      <label>Base TF</label>
      <select id="base-tf">
        <option value="15m">15M</option>
        <option value="240" selected>4H</option>
        <option value="D">1D</option>
      </select>
    </div>
    <div class="control-group">
      <label>HTF 1</label>
      <select id="htf1-tf">
        <option value="240">4H</option>
        <option value="D">1D</option>
        <option value="W" selected>1W</option>
        <option value="M">1M</option>
      </select>
      <input type="range" id="htf1-count" min="3" max="20" value="8" />
      <span class="value" id="htf1-value">8</span>
    </div>
    <div class="control-group">
      <label>HTF 2</label>
      <select id="htf2-tf">
        <option value="240">4H</option>
        <option value="D">1D</option>
        <option value="W">1W</option>
        <option value="M" selected>1M</option>
      </select>
      <input type="range" id="htf2-count" min="3" max="12" value="4" />
      <span class="value" id="htf2-value">4</span>
    </div>
    <div class="control-group">
      <label>Gap</label>
      <input type="range" id="htf-gap" min="1" max="20" value="5" />
      <span class="value" id="htf-gap-value">5</span>
    </div>
    <div class="control-group">
      <label>Col Gap</label>
      <input type="range" id="col-gap" min="0" max="10" value="2" />
      <span class="value" id="col-gap-value">2</span>
    </div>
  </div>

  <div id="watchlist">
    <div id="watchlist-header">
      <span class="pulse-dot"></span>
      <span class="live-text">LIVE</span>
      <span id="watchlist-title">Watchlist</span>
    </div>
    <div id="watchlist-entries">
      <div class="watchlist-item active" data-stock="ANTM.JK">
        <span class="wl-symbol">ANTM</span>
        <span class="wl-price">—</span>
        <span class="wl-change">—</span>
      </div>
      <div class="watchlist-item" data-stock="TLKM.JK">
        <span class="wl-symbol">TLKM</span>
        <span class="wl-price">—</span>
        <span class="wl-change">—</span>
      </div>
      <div class="watchlist-item" data-stock="PTBA.JK">
        <span class="wl-symbol">PTBA</span>
        <span class="wl-price">—</span>
        <span class="wl-change">—</span>
      </div>
    </div>
  </div>

  <div id="chart"></div>

  <div id="context-menu">
    <div id="context-menu-refresh">⟳ Refresh Data</div>
  </div>
  <script type="module">
    import { createChart, CandlestickSeries } from 'lightweight-charts';
    import { MTFPrimitive, aggregateOHLC } from '../dist/index.mjs';

    const TF_LABELS = { '15m': '15M', '60': '1H', '240': '4H', 'D': '1D', 'W': '1W', 'M': '1M' };

    let selectedStock = 'ANTM.JK';
    let baseTf = '240';
    let htf1Tf = 'W';
    let htf2Tf = 'M';
    let htf1Count = 8;
    let htf2Count = 4;
    let htfGap = 5;
    let colGap = 2;

    async function fetchKlines(ticker, interval, range, retries = 2) {
      for (let attempt = 0; attempt <= retries; attempt++) {
        try {
          const url = `/api/stock/${ticker}?interval=${interval}&range=${range}`;
          const res = await fetch(url);
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          const json = await res.json();
          if (!json.chart || !json.chart.result || json.chart.result.length === 0) {
            throw new Error(json.chart?.error?.description || "No data");
          }
          const result = json.chart.result[0];
          const timestamps = result.timestamp || [];
          const quote = result.indicators.quote[0];
          const data = [];
          const tzOffset = 7 * 3600;
          for (let i = 0; i < timestamps.length; i++) {
            if (
              quote.open[i] != null &&
              quote.high[i] != null &&
              quote.low[i] != null &&
              quote.close[i] != null
            ) {
              data.push({
                time: timestamps[i] + tzOffset,
                open: quote.open[i],
                high: quote.high[i],
                low: quote.low[i],
                close: quote.close[i],
                volume: quote.volume[i] || 0
              });
            }
          }
          return data;
        } catch (err) {
          if (attempt === retries) throw new Error(`Failed after ${retries + 1} attempts: ${err.message}`);
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }

    async function loadAllData() {
      let rawData;
      if (baseTf === '15m') {
        rawData = await fetchKlines(selectedStock, '15m', '60d');
      } else if (baseTf === '60' || baseTf === '240') {
        rawData = await fetchKlines(selectedStock, '1h', '360d');
      } else {
        rawData = await fetchKlines(selectedStock, '1d', '2y');
      }

      if (rawData.length === 0) {
        throw new Error("No data returned from API");
      }

      let base;
      if (baseTf === '15m' || baseTf === '60') {
        base = rawData;
      } else if (baseTf === '240') {
        base = aggregateOHLC(rawData, '4H');
      } else {
        base = rawData;
      }

      const getPeriod = (tfVal) => {
        if (tfVal === '240') return '4H';
        if (tfVal === 'D') return '1D';
        if (tfVal === 'W') return '1W';
        if (tfVal === 'M') return '1M';
        return null;
      };

      const htf1Period = getPeriod(htf1Tf);
      const htf2Period = getPeriod(htf2Tf);

      const htf1 = htf1Period ? aggregateOHLC(rawData, htf1Period) : [];
      const htf2 = htf2Period ? aggregateOHLC(rawData, htf2Period) : [];

      return { base, htf1, htf2 };
    }

    const loadingEl = document.getElementById('loading');
    function showLoading() {
      loadingEl.style.display = 'flex';
      loadingEl.style.opacity = '1';
    }
    function hideLoading() {
      loadingEl.style.opacity = '0';
      setTimeout(() => {
        loadingEl.style.display = 'none';
      }, 300);
    }

    // ── Set default visible range ──
    function setDefaultVisibleRange() {
      const now = Math.floor(Date.now() / 1000);
      const oneYearAgo = now - 365 * 86400;
      const barSec = baseTf === '15m' ? 900 : baseTf === '240' ? 14400 : 86400;
      const htfSpan = (htfGap + htf1Count + colGap + htf2Count + 2 + 60) * barSec;
      chart.timeScale().setVisibleRange({
        from: oneYearAgo,
        to: now + htfSpan,
      });
    }

    let { base: baseData, htf1: htf1Data, htf2: htf2Data } = await loadAllData();
    hideLoading();

    const chart = createChart(document.getElementById('chart'), {
      layout: {
        background: { color: '#fffcee' },
        textColor: '#4a4a4a',
      },
      grid: {
        vertLines: { color: 'transparent' },
        horzLines: { color: 'transparent' },
      },
      crosshair: { mode: 0 },
      timeScale: {
        borderColor: 'rgba(0,0,0,0.1)',
        timeVisible: baseTf === '15m' || baseTf === '60' || baseTf === '240',
      },
      rightPriceScale: {
        borderColor: 'rgba(0,0,0,0.1)',
      },
    });

    const mainSeries = chart.addSeries(CandlestickSeries, {
      upColor: 'rgba(129,199,132,0.5)',
      downColor: '#4a4a4a',
      borderVisible: true,
      borderUpColor: '#1b5e20',
      borderDownColor: '#000000',
      wickUpColor: '#1b5e20',
      wickDownColor: '#000000',
    });

    const mtf = new MTFPrimitive({
      columns: [
        {
          timeframe: TF_LABELS[htf1Tf] || htf1Tf,
          data: htf1Data,
          candleCount: htf1Count,
          upColor: 'rgba(129,199,132,0.5)',
          downColor: '#4a4a4a',
          borderVisible: true,
          borderUpColor: '#1b5e20',
          borderDownColor: '#000000',
          wickUpColor: '#1b5e20',
          wickDownColor: '#000000',
        },
        {
          timeframe: TF_LABELS[htf2Tf] || htf2Tf,
          data: htf2Data,
          candleCount: htf2Count,
          upColor: 'rgba(129,199,132,0.5)',
          downColor: '#4a4a4a',
          borderVisible: true,
          borderUpColor: '#1b5e20',
          borderDownColor: '#000000',
          wickUpColor: '#1b5e20',
          wickDownColor: '#000000',
        },
      ],
      gap: htfGap,
      columnGap: colGap,
      rightMargin: 60,
      showSeparators: true,
      separatorColor: 'rgba(0,0,0,0.08)',
      showLabels: true,
      labelFont: '11px -apple-system, BlinkMacSystemFont, sans-serif',
      labelColor: 'rgba(0,0,0,0.45)',
    });

    // ── FVG (Fair Value Gap) from weekly data ──
    function getTimeAsNumber(time) {
      if (typeof time === 'number') return time;
      if (typeof time === 'string') return Math.floor(new Date(time).getTime() / 1000);
      return Math.floor(new Date(`${time.year}-${String(time.month).padStart(2, '0')}-${String(time.day).padStart(2, '0')}`).getTime() / 1000);
    }

    class FVGPrimitive {
      constructor(opts) {
        this._weeklyData = opts.weeklyData || [];
        this._lastMainTime = opts.lastMainTime || 0;
        this._barDuration = opts.barDuration || 86400;
        this._chart = null;
        this._series = null;
        this._requestUpdate = null;
        this._zones = [];
        this._scan();
      }
      attached(param) {
        this._chart = param.chart;
        this._series = param.series;
        this._requestUpdate = param.requestUpdate;
      }
      detached() {
        this._chart = null;
        this._series = null;
        this._requestUpdate = null;
      }
      updateAllViews() {}
      paneViews() {
        return [{ renderer: () => this, zOrder: () => 'bottom' }];
      }
      updateData(weeklyData, lastMainTime, barDuration, fvgEndTime) {
        this._weeklyData = weeklyData || [];
        this._lastMainTime = lastMainTime;
        this._barDuration = barDuration;
        this._scan();
        if (this._requestUpdate) this._requestUpdate();
      }
      _scan() {
        this._zones = [];
        const data = this._weeklyData;
        for (let i = 0; i < data.length - 2; i++) {
          const c1 = data[i];
          const c2 = data[i + 1];
          const c3 = data[i + 2];
          let zone = null;
          if (c1.high < c3.low) {
            zone = { time: getTimeAsNumber(c2.time), high: c3.low, low: c1.high, type: 'bullish' };
          }
          if (c1.low > c3.high) {
            zone = { time: getTimeAsNumber(c2.time), high: c1.low, low: c3.high, type: 'bearish' };
          }
          if (!zone) continue;
          let closed = false;
          for (let j = i + 3; j < data.length; j++) {
            const later = data[j];
            if (zone.type === 'bullish' && later.close <= zone.low) { closed = true; break; }
            if (zone.type === 'bearish' && later.close >= zone.high) { closed = true; break; }
          }
          if (!closed) this._zones.push(zone);
        }
      }
      draw(target) {
        target.useBitmapCoordinateSpace((scope) => {
          const ctx = scope.context;
          const hRatio = scope.horizontalPixelRatio;
          const vRatio = scope.verticalPixelRatio;
          const chart = this._chart;
          const series = this._series;
          if (!chart || !series) return;
          const timeScale = chart.timeScale();
          const fvgEndTime = this._lastMainTime + 4 * this._barDuration;
          for (const zone of this._zones) {
            const x1 = timeScale.timeToCoordinate(zone.time);
            const x2 = timeScale.timeToCoordinate(fvgEndTime);
            const y1 = series.priceToCoordinate(zone.high);
            const y2 = series.priceToCoordinate(zone.low);
            if (x1 === null || y1 === null || y2 === null) continue;
            const x2Coord = x2 !== null ? x2 : x1 + 100;
            const px = Math.min(x1, x2Coord) * hRatio;
            const py = Math.min(y1, y2) * vRatio;
            const pw = Math.abs(x2Coord - x1) * hRatio;
            const ph = Math.max(Math.abs(y2 - y1), 1) * vRatio;
            const isBullish = zone.type === 'bullish';
            ctx.fillStyle = isBullish ? 'rgba(46,125,50,0.12)' : 'rgba(128,128,128,0.15)';
            ctx.fillRect(px, py, pw, ph);
            ctx.strokeStyle = isBullish ? 'rgba(46,125,50,0.3)' : 'rgba(128,128,128,0.3)';
            ctx.lineWidth = 1 * hRatio;
            ctx.strokeRect(px, py, pw, ph);
            // midline
            const midPrice = (zone.high + zone.low) / 2;
            const midY = series.priceToCoordinate(midPrice);
            if (midY !== null) {
              ctx.beginPath();
              ctx.setLineDash([4 * hRatio, 4 * hRatio]);
              ctx.strokeStyle = isBullish ? 'rgba(46,125,50,0.5)' : 'rgba(128,128,128,0.5)';
              ctx.lineWidth = 1.5 * hRatio;
              ctx.moveTo(Math.min(x1, x2Coord) * hRatio, midY * vRatio);
              ctx.lineTo(Math.max(x1, x2Coord) * hRatio, midY * vRatio);
              ctx.stroke();
              ctx.setLineDash([]);
            }
          }
        });
      }
    }

    let fvgPrimitive = null;
    mtf.attach(chart, mainSeries, baseData);
    updateFVG();

    function renderAll() {
      mtf.update(baseData, {
        columns: [
          {
            timeframe: TF_LABELS[htf1Tf] || htf1Tf,
            data: htf1Data,
            candleCount: htf1Count,
            upColor: 'rgba(129,199,132,0.5)',
            downColor: '#4a4a4a',
            borderVisible: true,
            borderUpColor: '#1b5e20',
            borderDownColor: '#000000',
            wickUpColor: '#1b5e20',
            wickDownColor: '#000000',
          },
          {
            timeframe: TF_LABELS[htf2Tf] || htf2Tf,
            data: htf2Data,
            candleCount: htf2Count,
            upColor: 'rgba(129,199,132,0.5)',
            downColor: '#4a4a4a',
            borderVisible: true,
            borderUpColor: '#1b5e20',
            borderDownColor: '#000000',
            wickUpColor: '#1b5e20',
            wickDownColor: '#000000',
          },
        ],
        gap: htfGap,
        columnGap: colGap,
        rightMargin: 60,
      });
      updateFVG();
    }

    function updateFVG() {
      const barDuration = baseTf === '15m' ? 900 : baseTf === '240' ? 14400 : 86400;
      const lastTime = baseData.length > 0 ? getTimeAsNumber(baseData[baseData.length - 1].time) : 0;
      if (fvgPrimitive) {
        fvgPrimitive.updateData(htf1Data, lastTime, barDuration);
      } else {
        fvgPrimitive = new FVGPrimitive({ weeklyData: htf1Data, lastMainTime: lastTime, barDuration });
        mainSeries.attachPrimitive(fvgPrimitive);
      }
    }

    let debounceTimer = null;
    let autoUpdateInterval = null;

    async function refreshData(silent = false, resetRange = false) {
      if (!silent) showLoading();
      try {
        const { base, htf1, htf2 } = await loadAllData();
        baseData = base;
        htf1Data = htf1;
        htf2Data = htf2;
        renderAll();
        if (resetRange) setDefaultVisibleRange();
        if (silent) updateWatchlistQuotes();
      } catch (err) {
        console.error(err);
        if (!silent) {
          alert("Failed to load stock data: " + err.message);
        }
      } finally {
        if (!silent) hideLoading();
      }
    }

    function startAutoUpdate() {
      stopAutoUpdate();
      autoUpdateInterval = setInterval(() => {
        refreshData(true);
      }, 30000); // refresh every 30 seconds
    }

    function stopAutoUpdate() {
      if (autoUpdateInterval) {
        clearInterval(autoUpdateInterval);
        autoUpdateInterval = null;
      }
    }

    function debouncedRefresh(resetRange = false) {
      clearTimeout(debounceTimer);
      stopAutoUpdate();
      debounceTimer = setTimeout(() => {
        refreshData(false, resetRange).then(() => {
          startAutoUpdate();
        });
      }, 300);
    }

    // Start auto update on page load
    startAutoUpdate();

    document.getElementById('base-tf').addEventListener('change', (e) => {
      baseTf = e.target.value;
      chart.timeScale().applyOptions({ timeVisible: baseTf === '15m' || baseTf === '60' || baseTf === '240' });
      debouncedRefresh(true);
    });

    document.getElementById('htf1-tf').addEventListener('change', (e) => {
      htf1Tf = e.target.value;
      debouncedRefresh(true);
    });

    document.getElementById('htf2-tf').addEventListener('change', (e) => {
      htf2Tf = e.target.value;
      debouncedRefresh(true);
    });

    document.getElementById('htf1-count').addEventListener('input', (e) => {
      htf1Count = parseInt(e.target.value);
      document.getElementById('htf1-value').textContent = htf1Count;
      renderAll();
      debouncedRefresh();
    });

    document.getElementById('htf2-count').addEventListener('input', (e) => {
      htf2Count = parseInt(e.target.value);
      document.getElementById('htf2-value').textContent = htf2Count;
      renderAll();
      debouncedRefresh();
    });

    document.getElementById('htf-gap').addEventListener('input', (e) => {
      htfGap = parseInt(e.target.value);
      document.getElementById('htf-gap-value').textContent = htfGap;
      renderAll();
    });

    document.getElementById('col-gap').addEventListener('input', (e) => {
      colGap = parseInt(e.target.value);
      document.getElementById('col-gap-value').textContent = colGap;
      renderAll();
    });

    // ── Watchlist ──
    const WATCHLIST_TICKERS = [
      { symbol: 'ANTM', value: 'ANTM.JK' },
      { symbol: 'TLKM', value: 'TLKM.JK' },
      { symbol: 'PTBA', value: 'PTBA.JK' },
    ];
    const watchlistItems = document.querySelectorAll('.watchlist-item');

    async function fetchQuote(ticker) {
      try {
        const data = await fetchKlines(ticker, '1d', '5d');
        if (data.length < 2) return null;
        const last = data[data.length - 1].close;
        const prev = data[data.length - 2].close;
        return { price: last, change: last - prev, changePct: ((last - prev) / prev) * 100 };
      } catch { return null; }
    }

    async function updateWatchlistQuotes() {
      for (const item of watchlistItems) {
        const stock = item.dataset.stock;
        const quote = await fetchQuote(stock);
        const priceEl = item.querySelector('.wl-price');
        const changeEl = item.querySelector('.wl-change');
        if (quote) {
          priceEl.textContent = quote.price.toFixed(0);
          changeEl.textContent = (quote.change >= 0 ? '+' : '') + quote.changePct.toFixed(2) + '%';
          changeEl.className = 'wl-change ' + (quote.change >= 0 ? 'pos' : 'neg');
        }
      }
    }

    // Update active watchlist item
    function setActiveWatchlist(stockValue) {
      watchlistItems.forEach(el => {
        el.classList.toggle('active', el.dataset.stock === stockValue);
      });
    }

    // Watchlist click
    watchlistItems.forEach(el => {
      el.addEventListener('click', () => {
        const val = el.dataset.stock;
        if (val === selectedStock) return;
        selectedStock = val;
        setActiveWatchlist(val);
        debouncedRefresh(true);
      });
    });

    // ── Context Menu (right-click refresh) ──
    const contextMenu = document.getElementById('context-menu');
    const chartContainer = document.getElementById('chart');

    chartContainer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const x = Math.min(e.clientX, window.innerWidth - 180);
      const y = Math.min(e.clientY, window.innerHeight - 60);
      contextMenu.style.left = x + 'px';
      contextMenu.style.top = y + 'px';
      contextMenu.style.display = 'block';
    });

    document.getElementById('context-menu-refresh').addEventListener('click', () => {
      contextMenu.style.display = 'none';
      refreshData(false, true);
    });

    document.addEventListener('click', () => {
      contextMenu.style.display = 'none';
    });

    // Call after initial render
    setDefaultVisibleRange();

    // Initial watchlist quote fetch
    updateWatchlistQuotes();

    // ── Set active on initial load ──
    setActiveWatchlist(selectedStock);
  </script>
</body>
</html>
